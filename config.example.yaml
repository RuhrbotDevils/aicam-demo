# AICam node configuration — example template.
#
# scripts/install_locally.sh and scripts/setup_pi_env.sh copy this
# file to config.yaml when one doesn't already exist, then set
# `node.id` to the install hostname / target id. After install you
# can edit config.yaml directly, or use the Configuration page in the
# web UI to tune the runtime values (streaming URL, models, etc.).
#
# All keys here are read by apps/control_api/app/models.py
# (Pydantic schema). Defaults shown match the in-code defaults so a
# fresh install behaves predictably.

node:
  # Logical ID for this device. Overwritten by the install script
  # to match the hostname / target id.
  id: cam-01
  role: standalone
  camera_position:
    x: 0.0
    y: -4.0
    z: 2.0

network:
  camera_network:
    interface: eth0
    address: 192.168.50.10
    netmask: 255.255.255.0
  field_wifi:
    interface: wlan0
    listen_only: true
    profiles: []

features:
  detection: true
  online_streaming: true
  recording: true
  cpu_detection: true

video:
  source: live
  camera:
    width: 1920
    height: 1080
    fps: 30
  recording:
    directory: recordings/
    video_codec: h264
    audio_codec: flac
    audio_enabled: true
    recording_mode: manual
  streaming:
    enabled: false
    platform: youtube
    rtmp_url: ''
    stream_key: ''
    bitrate_kbps: 2500
    flow_check_grace_s: 10

audio:
  device: default
  agc: true
  volume: 1.0

ai:
  accelerator: hailo
  object_detection_model: RoboCup HSL Objects 1408x800 YOLO26s (Hailo-10H)
  cpu_object_detection_model: RoboCup Landmarks 1920x1088 - YOLO26s (CPU)
